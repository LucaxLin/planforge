# PlanForge Backend Nginx Configuration
# Place this file in /etc/nginx/sites-available/planforge-api
# Then symlink: ln -s /etc/nginx/sites-available/planforge-api /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name planforge-api.lucaslinn.cc.cd;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name planforge-api.lucaslinn.cc.cd;

    # SSL Certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/planforge-api.lucaslinn.cc.cd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/planforge-api.lucaslinn.cc.cd/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/planforge-api.lucaslinn.cc.cd/chain.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Client Max Body Size (for file uploads if needed)
    client_max_body_size 10M;

    # Proxy to Node.js Backend
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Required for SSE (Server-Sent Events)
        proxy_set_header Connection '';
        proxy_set_header Accept '';
        proxy_set_header Accept-Encoding '';
        proxy_buffering off;
        proxy_cache off;

        # Pass headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:3001;
        access_log off;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
}
